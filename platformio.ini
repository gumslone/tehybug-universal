; PlatformIO build configuration for the TeHyBug firmware.
;
; The arduino-cli build (build.sh) remains the reference; this mirrors its
; board options and flags. The sketch stays at the repo root and includes
; src/<header>.h as a single translation unit, so src_dir is the repo root and
; only the .ino is compiled (build_src_filter); the modules in src/ and the
; vendored libraries are pulled in through its includes.
;
; espressif8266 2.6.3 bundles Arduino core 2.7.4 — the version build.sh /
; ci/install-deps.sh pin.
;
; Build:   pio run -e esp8285        (recommended universal board)
;          pio run -e generic        (old/first-gen TeHyBug / 1 MB)
;          pio run -e esp8285_debug  (serial debug output)

[platformio]
; The sketch (tehybug-universal.ino) lives at the repo root and includes
; src/<header>.h, so the project source dir is the root and build_src_filter
; (below) limits the build to just the sketch.
src_dir = .
default_envs = esp8285

[env]
platform = espressif8266@2.6.3
framework = arduino
monitor_speed = 115200
upload_resetmethod = nodemcu
; vendored, known-good library versions (incl. the PubSubClient patched to
; MQTT_MAX_PACKET_SIZE 4000) — prefer these over the registry
lib_extra_dirs = libraries
; deep (not deep+) so the finder follows every #include in the vendored libs
; unconditionally — deep+ evaluates the #if guards and would drop e.g.
; arduinoWebSockets' ESP8266WiFi.h dependency
lib_ldf_mode = deep
; src_dir is the repo root; build only the sketch (it pulls in src/*.h as one
; translation unit), not the other top-level dirs
build_src_filter = +<*> -<src> -<tests> -<libraries> -<ci> -<html> -<images> -<.pio> -<.build> -<firmware>
build_flags =
    -DHTTPCLIENT_1_1_COMPATIBLE=0

; --- TeHyBug universal (ESP8285, 2 MB, full feature set) ---------------------
[env:esp8285]
board = esp8285
board_build.ldscript = eagle.flash.2m64.ld
board_upload.flash_size = 2MB
build_flags =
    ${env.build_flags}
    -DPIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
    -DLED_BUILTIN=2
    -DWM_NODEBUG=1

; --- ESP8285 with serial debug output --------------------------------------
[env:esp8285_debug]
extends = env:esp8285
build_flags =
    ${env.build_flags}
    -DPIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
    -DLED_BUILTIN=2
    -DDEBUG=1
    -DDEBUG_ESP_PORT=Serial

; --- Old / first-gen TeHyBug (esp-01 / generic ESP8266, 1 MB, slimmed) ------
; ARDUINO_ESP8266_GENERIC selects the slim code path (no BSEC/NeoPixel/RTC log,
; no https) so the image fits a 1 MB board with room for OTA.
[env:generic]
board = esp01_1m
board_build.ldscript = eagle.flash.1m64.ld
build_flags =
    ${env.build_flags}
    -DPIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY_LOW_FLASH
    -DARDUINO_ESP8266_GENERIC
    -DWM_NODEBUG=1

; --- Old / first-gen TeHyBug with serial debug output ----------------------
[env:generic_debug]
board = esp01_1m
board_build.ldscript = eagle.flash.1m64.ld
build_flags =
    ${env.build_flags}
    -DPIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY_LOW_FLASH
    -DARDUINO_ESP8266_GENERIC
    -DDEBUG=1
    -DDEBUG_ESP_PORT=Serial
