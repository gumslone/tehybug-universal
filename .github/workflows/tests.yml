name: Tests

on:
  pull_request:
  push:
    branches: [main, development]

jobs:
  native-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run native host tests
        run: ./tests/run.sh

  clang-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy

      - name: Static analysis
        run: ./tests/tidy.sh
