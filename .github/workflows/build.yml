name: Build firmware

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: arduino/setup-arduino-cli@v2

      - name: Cache Arduino toolchain
        uses: actions/cache@v4
        with:
          path: ~/.arduino15
          key: arduino-deps-${{ hashFiles('ci/install-deps.sh') }}

      - name: Install toolchain
        run: ./ci/install-deps.sh

      # The firmware derives its version from the compile timestamp
      # (YYMMDDHHMM, see fw_version.h); capture the same timestamp at build
      # start so the release tag matches the version the device reports.
      - name: Set version
        id: version
        run: echo "tag=v$(date -u +%y%m%d%H%M)" >> "$GITHUB_OUTPUT"

      - name: Build firmware binaries
        run: |
          ./build.sh all
          ./build.sh esp8285 debug

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware/tehybug.ino.*.bin

      # Prepend a release section to CHANGELOG.md from the commits since the
      # last tag, and write release-notes.md for the release body.
      - name: Update changelog
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ./ci/changelog.sh "${{ steps.version.outputs.tag }}"

      - name: Commit updated binaries and changelog
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add firmware/tehybug.ino.esp8285.bin firmware/tehybug.ino.esp8285_debug.bin firmware/tehybug.ino.generic.bin CHANGELOG.md
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Build firmware binaries + changelog [skip ci]"
            git push
          fi

      - name: Create release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "TeHyBug firmware $TAG" \
            --notes-file release-notes.md \
            firmware/tehybug.ino.esp8285.bin \
            firmware/tehybug.ino.esp8285_debug.bin \
            firmware/tehybug.ino.generic.bin
